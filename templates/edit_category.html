<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Category - BU-Flower Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#FFB6C1', // Pastel Pink
                        secondary: '#87CEEB', // Pastel Blue
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50">
    <header class="bg-gradient-to-r from-pink-300 to-blue-300 text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-4xl font-extrabold text-center bg-gradient-to-r from-pink-400 to-blue-400 bg-clip-text text-transparent">🌸 BU-Flower Store 💐</h1>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <h2 class="text-2xl font-semibold text-pink-800 mb-6">Edit Category</h2>

        <form method="POST" class="bg-pink-50 p-6 rounded-lg shadow-md">
            <div class="mb-4">
                <label for="name" class="block text-pink-700 text-sm font-bold mb-2">Name:</label>
                <input type="text" id="name" name="name" value="{{ category.name }}" required class="shadow appearance-none border rounded w-full py-2 px-3 text-pink-700 leading-tight focus:outline-none focus:shadow-outline">
            </div>
            <div class="mb-4">
                <label for="description" class="block text-pink-700 text-sm font-bold mb-2">Description:</label>
                <textarea id="description" name="description" rows="3" class="shadow appearance-none border rounded w-full py-2 px-3 text-pink-700 leading-tight focus:outline-none focus:shadow-outline">{{ category.description }}</textarea>
            </div>
            <div class="flex items-center justify-between">
                <button type="submit" class="bg-pink-600 text-white px-4 py-2 rounded hover:bg-pink-700">Update Category</button>
                <a href="{{ url_for('categories') }}" class="bg-pink-600 text-white px-4 py-2 rounded hover:bg-pink-700">Cancel</a>
            </div>
        </form>

        <div class="mt-6">
            <a href="{{ url_for('index') }}" class="bg-pink-600 text-white px-4 py-2 rounded hover:bg-pink-700">Back to Home</a>
        </div>
    </main>

    <footer class="bg-gradient-to-r from-pink-300 to-blue-300 text-white py-4 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p>&copy; 2024 BU-Flower Store. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
